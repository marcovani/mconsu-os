<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MCONSU · Ordens de Serviço</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#143229">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --paper:#F7F5F0;
    --ink:#1B1F23;
    --ink-soft:#5B6168;
    --line:#D9D4C8;
    --green:#1F4D3D;
    --green-deep:#143229;
    --amber:#B9802E;
    --red:#9B3B33;
    --mono: 'Courier New', monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    -webkit-font-smoothing:antialiased;
  }
  .sans{font-family: -apple-system, Helvetica, Arial, sans-serif;}
  header.app{
    background:var(--green-deep); color:#fff; padding:18px 16px 14px;
    position:sticky; top:0; z-index:10;
    border-bottom:3px solid var(--amber);
  }
  header.app .brand{font-size:13px; letter-spacing:.12em; text-transform:uppercase; opacity:.75; font-family:Helvetica,Arial,sans-serif;}
  header.app h1{margin:2px 0 0; font-size:20px; font-weight:normal; letter-spacing:.01em;}
  nav.tabs{
    display:flex; background:#fff; border-bottom:1px solid var(--line);
    position:sticky; top:64px; z-index:9; font-family:Helvetica,Arial,sans-serif;
  }
  nav.tabs button{
    flex:1; padding:12px 4px; background:none; border:none; font-size:11px;
    letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); cursor:pointer;
    border-bottom:3px solid transparent;
  }
  nav.tabs button.active{color:var(--green-deep); border-bottom-color:var(--amber); font-weight:bold;}
  main{padding:16px; max-width:520px; margin:0 auto; padding-bottom:60px;}
  .card{
    background:#fff; border:1px solid var(--line); border-radius:2px;
    padding:18px; margin-bottom:14px; position:relative;
  }
  .card::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--green);
  }
  label{display:block; font-family:Helvetica,Arial,sans-serif; font-size:11px; text-transform:uppercase;
    letter-spacing:.06em; color:var(--ink-soft); margin:14px 0 5px;}
  label:first-child{margin-top:0;}
  input, select{
    width:100%; padding:11px 10px; border:1px solid var(--line); border-radius:2px;
    font-size:16px; font-family:var(--mono); background:#FCFBF8; color:var(--ink);
  }
  input:focus, select:focus{outline:none; border-color:var(--green);}
  .btn{
    display:block; width:100%; padding:14px; border:none; border-radius:2px;
    font-family:Helvetica,Arial,sans-serif; font-size:14px; letter-spacing:.04em;
    text-transform:uppercase; font-weight:bold; cursor:pointer; margin-top:18px;
  }
  .btn-primary{background:var(--green); color:#fff;}
  .btn-amber{background:var(--amber); color:#fff;}
  .btn-outline{background:none; border:1px solid var(--ink-soft); color:var(--ink); margin-top:8px;}
  .btn-wa{background:#1d6b4d; color:#fff;}
  .os-ticket{
    background:#fff; border:1px solid var(--line); padding:16px;
    background-image: repeating-linear-gradient(transparent, transparent 27px, var(--line) 28px);
  }
  .os-ticket .eyebrow{font-family:Helvetica,Arial,sans-serif; font-size:10px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--ink-soft);}
  .os-ticket h2{margin:2px 0 10px; font-size:16px; border-bottom:1px solid var(--ink); padding-bottom:8px;}
  .row{display:flex; justify-content:space-between; gap:10px; font-size:14px; margin:5px 0; font-family:var(--mono);}
  .row .k{color:var(--ink-soft); font-family:Helvetica,Arial,sans-serif; font-size:12px;}
  .stamp{
    display:inline-block; font-family:Helvetica,Arial,sans-serif; font-weight:bold; font-size:11px;
    letter-spacing:.08em; text-transform:uppercase; padding:4px 10px; border-radius:20px; color:#fff;
  }
  .stamp.andamento{background:var(--amber);}
  .stamp.concluida{background:var(--green);}
  .empty{text-align:center; padding:40px 20px; color:var(--ink-soft); font-family:Helvetica,Arial,sans-serif; font-size:13px;}
  .dash-num{font-size:34px; font-family:Helvetica,Arial,sans-serif; font-weight:bold; color:var(--green-deep);}
  .dash-label{font-family:Helvetica,Arial,sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft);}
  .footer-note{font-family:Helvetica,Arial,sans-serif; font-size:10px; color:var(--ink-soft); text-align:center; margin-top:20px;}
</style>
</head>
<body>

<header class="app">
  <div class="brand">MCONSU EMPREENDIMENTOS LTDA</div>
  <h1>Ordens de Serviço · Transporte</h1>
</header>

<nav class="tabs">
  <button class="active" data-tab="nova">Nova OS</button>
  <button data-tab="andamento">Andamento</button>
  <button data-tab="concluidas">Concluídas</button>
  <button data-tab="dash">Painel</button>
</nav>

<main>

  <!-- ABA: NOVA OS -->
  <section id="tab-nova">
    <div class="card">
      <label>Nome completo do passageiro</label>
      <input id="f-nome" class="sans" placeholder="Ex: João da Silva">

      <label>CPF do passageiro</label>
      <input id="f-cpf" inputmode="numeric" placeholder="000.000.000-00">

      <label>Origem (Rua, Cidade/UF)</label>
      <input id="f-origem" class="sans" placeholder="Ex: Av. Brasil, 100 - Betim/MG">

      <label>Destino (Rua, Cidade/UF)</label>
      <input id="f-destino" class="sans" placeholder="Ex: Aeroporto Confins/MG">

      <label>Valor acordado da viagem (R$)</label>
      <input id="f-valor" inputmode="decimal" placeholder="Ex: 250,00">

      <button class="btn btn-primary" onclick="abrirOS()">Abrir Ordem de Serviço</button>
    </div>
  </section>

  <!-- ABA: EM ANDAMENTO -->
  <section id="tab-andamento" style="display:none;"></section>

  <!-- ABA: CONCLUÍDAS -->
  <section id="tab-concluidas" style="display:none;"></section>

  <!-- ABA: DASHBOARD -->
  <section id="tab-dash" style="display:none;"></section>

</main>

<script>
const EMPRESA = {
  razaoSocial: "MCONSU EMPREENDIMENTOS LTDA",
  cnpj: "51.793.391/0001-80",
  sede: "Betim - MG",
  cnae: "49.23-0-02 - Locação de automóveis com motorista"
};

const STORAGE_KEY = "mconsu_viagens_v1";

function getViagens(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e){ return []; }
}
function saveViagens(v){ localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); }

function fmtMoeda(v){
  return Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtData(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

// ---------- TABS ----------
const tabs = document.querySelectorAll('nav.tabs button');
tabs.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabs.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('main > section').forEach(s=>s.style.display='none');
    document.getElementById('tab-'+btn.dataset.tab).style.display='block';
    render();
  });
});

// ---------- ABRIR OS ----------
function abrirOS(){
  const nome = document.getElementById('f-nome').value.trim();
  const cpf = document.getElementById('f-cpf').value.trim();
  const origem = document.getElementById('f-origem').value.trim();
  const destino = document.getElementById('f-destino').value.trim();
  const valor = document.getElementById('f-valor').value.replace(',', '.').trim();

  if(!nome || !cpf || !origem || !destino || !valor){
    alert('Preencha todos os campos antes de abrir a OS.');
    return;
  }

  const viagens = getViagens();
  const novaOS = {
    id: 'OS-' + Date.now(),
    passageiro: nome,
    cpf: cpf,
    origem: origem,
    destino: destino,
    valor: parseFloat(valor),
    status: 'EM ANDAMENTO',
    aberturaISO: new Date().toISOString(),
    conclusaoISO: null,
    formaPagamento: null
  };
  viagens.unshift(novaOS);
  saveViagens(viagens);

  // limpa formulário
  ['f-nome','f-cpf','f-origem','f-destino','f-valor'].forEach(id=>document.getElementById(id).value='');

  // vai para aba andamento e abre o ticket
  document.querySelector('[data-tab="andamento"]').click();
}

// ---------- RENDER ANDAMENTO ----------
function render(){
  renderAndamento();
  renderConcluidas();
  renderDash();
}

function renderAndamento(){
  const el = document.getElementById('tab-andamento');
  const lista = getViagens().filter(v=>v.status==='EM ANDAMENTO');
  if(lista.length===0){
    el.innerHTML = '<div class="empty">Nenhuma viagem em andamento.<br>Abra uma nova OS na primeira aba.</div>';
    return;
  }
  el.innerHTML = lista.map(v=>`
    <div class="os-ticket" style="margin-bottom:16px;">
      <div class="eyebrow">Ordem de Serviço de Transporte Privado</div>
      <h2>${EMPRESA.razaoSocial}</h2>
      <div class="row"><span class="k">CNPJ</span><span>${EMPRESA.cnpj}</span></div>
      <div class="row"><span class="k">Sede</span><span>${EMPRESA.sede}</span></div>
      <div class="row"><span class="k">CNAE</span><span>${EMPRESA.cnae}</span></div>
      <div class="row"><span class="k">OS Nº</span><span>${v.id}</span></div>
      <div class="row"><span class="k">Abertura</span><span>${fmtData(v.aberturaISO)}</span></div>
      <div class="row"><span class="k">Status</span><span class="stamp andamento">${v.status}</span></div>
      <hr style="border:none;border-top:1px solid var(--line); margin:10px 0;">
      <div class="row"><span class="k">Passageiro</span><span>${v.passageiro}</span></div>
      <div class="row"><span class="k">CPF</span><span>${v.cpf}</span></div>
      <div class="row"><span class="k">Origem</span><span style="text-align:right;">${v.origem}</span></div>
      <div class="row"><span class="k">Destino</span><span style="text-align:right;">${v.destino}</span></div>
      <div class="row"><span class="k">Valor acordado</span><span>R$ ${fmtMoeda(v.valor)}</span></div>
    </div>
    <button class="btn btn-outline" onclick="gerarPdfOS('${v.id}')">Baixar PDF da OS</button>
    <button class="btn btn-amber" onclick="abrirConclusao('${v.id}')">Concluir Viagem</button>
    <div id="conclusao-${v.id}"></div>
  `).join('<div style="height:24px;"></div>');
}

// ---------- CONCLUSÃO ----------
function abrirConclusao(id){
  const div = document.getElementById('conclusao-'+id);
  if(div.innerHTML){ div.innerHTML=''; return; }
  div.innerHTML = `
    <div class="card" style="margin-top:10px;">
      <label>Forma de pagamento</label>
      <select id="pag-${id}">
        <option value="Pix Corporativo">Pix Corporativo</option>
        <option value="Cartão de Débito">Cartão de Débito</option>
        <option value="Cartão de Crédito">Cartão de Crédito</option>
      </select>
      <button class="btn btn-primary" onclick="concluirViagem('${id}')">Confirmar Pagamento e Concluir</button>
    </div>
  `;
}

function concluirViagem(id){
  const viagens = getViagens();
  const v = viagens.find(x=>x.id===id);
  if(!v) return;
  v.status = 'CONCLUÍDA';
  v.formaPagamento = document.getElementById('pag-'+id).value;
  v.conclusaoISO = new Date().toISOString();
  saveViagens(viagens);
  document.querySelector('[data-tab="concluidas"]').click();
}

// ---------- RENDER CONCLUÍDAS ----------
function renderConcluidas(){
  const el = document.getElementById('tab-concluidas');
  const lista = getViagens().filter(v=>v.status==='CONCLUÍDA');
  if(lista.length===0){
    el.innerHTML = '<div class="empty">Nenhuma viagem concluída ainda.</div>';
    return;
  }
  el.innerHTML = lista.map(v=>`
    <div class="card">
      <div class="row"><span class="k">${v.id}</span><span class="stamp concluida">CONCLUÍDA</span></div>
      <div class="row"><span class="k">Passageiro</span><span>${v.passageiro}</span></div>
      <div class="row"><span class="k">Valor</span><span>R$ ${fmtMoeda(v.valor)}</span></div>
      <div class="row"><span class="k">Pagamento</span><span>${v.formaPagamento}</span></div>
      <div class="row"><span class="k">Concluída em</span><span>${fmtData(v.conclusaoISO)}</span></div>
      <button class="btn btn-outline" onclick="gerarPdfRecibo('${v.id}')">Baixar Recibo PDF</button>
      <button class="btn btn-wa" onclick="compartilharWhats('${v.id}')">Enviar Recibo por WhatsApp</button>
    </div>
  `).join('');
}

// ---------- DASHBOARD ----------
function renderDash(){
  const el = document.getElementById('tab-dash');
  const viagens = getViagens();
  const agora = new Date();
  const doMes = viagens.filter(v=>{
    if(v.status!=='CONCLUÍDA') return false;
    const d = new Date(v.conclusaoISO);
    return d.getMonth()===agora.getMonth() && d.getFullYear()===agora.getFullYear();
  });
  const total = doMes.reduce((s,v)=>s+v.valor,0);
  const limiteAlerta = 30000; // ajuste conforme o limite de faixa do Simples que fizer sentido monitorar

  el.innerHTML = `
    <div class="card" style="text-align:center;">
      <div class="dash-label">Faturamento bruto · mês atual</div>
      <div class="dash-num">R$ ${fmtMoeda(total)}</div>
      <div class="dash-label" style="margin-top:6px;">${doMes.length} viagem(ns) concluída(s)</div>
    </div>
    ${total>limiteAlerta ? `<div class="card" style="border-left-color:var(--red);"><b class="sans" style="color:var(--red);">Atenção:</b> <span class="sans">faturamento do mês ultrapassou R$ ${fmtMoeda(limiteAlerta)}. Revise a faixa do Simples Nacional (Anexo III) com o contador.</span></div>` : ''}
    <button class="btn btn-primary" onclick="exportarCSV()">Exportar CSV do mês para o contador</button>
    <div class="footer-note">
      Espelho para emissão de NFS-e na Prefeitura de Betim · ${EMPRESA.cnpj}
    </div>
  `;
}

function exportarCSV(){
  const agora = new Date();
  const doMes = getViagens().filter(v=>{
    if(v.status!=='CONCLUÍDA') return false;
    const d = new Date(v.conclusaoISO);
    return d.getMonth()===agora.getMonth() && d.getFullYear()===agora.getFullYear();
  });
  if(doMes.length===0){ alert('Nenhuma viagem concluída neste mês.'); return; }

  let csv = "Data;Nome do Cliente;CPF;Valor (R$);Forma de Pagamento\n";
  doMes.forEach(v=>{
    const data = new Date(v.conclusaoISO).toLocaleDateString('pt-BR');
    csv += `${data};${v.passageiro};${v.cpf};${fmtMoeda(v.valor)};${v.formaPagamento}\n`;
  });

  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `faturamento_mconsu_${agora.getMonth()+1}_${agora.getFullYear()}.csv`;
  a.click();
}

// ---------- PDF: ORDEM DE SERVIÇO ----------
function gerarPdfOS(id){
  const v = getViagens().find(x=>x.id===id);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 20;
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text('ORDEM DE SERVIÇO DE TRANSPORTE PRIVADO - MCONSU', 14, y); y+=8;
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(`${EMPRESA.razaoSocial}  |  CNPJ: ${EMPRESA.cnpj}`, 14, y); y+=6;
  doc.text(`Sede: ${EMPRESA.sede}  |  CNAE: ${EMPRESA.cnae}`, 14, y); y+=10;
  doc.setDrawColor(180); doc.line(14,y,196,y); y+=8;
  doc.setFont('helvetica','bold'); doc.text(`OS Nº: ${v.id}`, 14, y); y+=7;
  doc.setFont('helvetica','normal');
  doc.text(`Abertura: ${fmtData(v.aberturaISO)}`, 14, y); y+=7;
  doc.text(`Status: ${v.status}`, 14, y); y+=10;
  doc.text(`Passageiro: ${v.passageiro}`, 14, y); y+=7;
  doc.text(`CPF: ${v.cpf}`, 14, y); y+=7;
  doc.text(`Origem: ${v.origem}`, 14, y); y+=7;
  doc.text(`Destino: ${v.destino}`, 14, y); y+=7;
  doc.text(`Valor acordado: R$ ${fmtMoeda(v.valor)}`, 14, y); y+=14;
  doc.setFontSize(8); doc.setTextColor(120);
  doc.text('Documento gerado eletronicamente para fins de comprovação de prestação de serviço de transporte privado contratado.', 14, y, {maxWidth:180});
  doc.save(`${v.id}_OS.pdf`);
}

// ---------- PDF: RECIBO ----------
function gerarPdfRecibo(id){
  const v = getViagens().find(x=>x.id===id);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 20;
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text('RECIBO DE PAGAMENTO - TRANSPORTE PRIVADO', 14, y); y+=8;
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(`${EMPRESA.razaoSocial}  |  CNPJ: ${EMPRESA.cnpj}`, 14, y); y+=6;
  doc.text(`Sede: ${EMPRESA.sede}  |  CNAE: ${EMPRESA.cnae}`, 14, y); y+=10;
  doc.setDrawColor(180); doc.line(14,y,196,y); y+=8;
  doc.setFont('helvetica','bold'); doc.text(`Recibo referente à OS: ${v.id}`, 14, y); y+=10;
  doc.setFont('helvetica','normal');
  doc.text(`Recebemos de: ${v.passageiro}  (CPF: ${v.cpf})`, 14, y); y+=7;
  doc.text(`A quantia de: R$ ${fmtMoeda(v.valor)}`, 14, y); y+=7;
  doc.text(`Referente ao trajeto: ${v.origem} -> ${v.destino}`, 14, y, {maxWidth:180}); y+=7;
  doc.text(`Forma de pagamento: ${v.formaPagamento}`, 14, y); y+=7;
  doc.text(`Data/hora de conclusão: ${fmtData(v.conclusaoISO)}`, 14, y); y+=14;
  doc.setFontSize(8); doc.setTextColor(120);
  doc.text('Recibo emitido para fins de comprovação de pagamento. NFS-e correspondente será emitida junto à Prefeitura de Betim conforme regime de competência mensal.', 14, y, {maxWidth:180});
  doc.save(`${v.id}_Recibo.pdf`);
}

// ---------- WHATSAPP ----------
function compartilharWhats(id){
  const v = getViagens().find(x=>x.id===id);
  const texto = `*RECIBO DE PAGAMENTO - MCONSU*\n\n`+
    `OS: ${v.id}\n`+
    `Passageiro: ${v.passageiro}\n`+
    `Trajeto: ${v.origem} -> ${v.destino}\n`+
    `Valor: R$ ${fmtMoeda(v.valor)}\n`+
    `Pagamento: ${v.formaPagamento}\n`+
    `Concluído em: ${fmtData(v.conclusaoISO)}\n\n`+
    `MCONSU EMPREENDIMENTOS LTDA - CNPJ ${EMPRESA.cnpj}`;
  const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;
  window.open(url, '_blank');
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW falhou:', err));
  });
}
</script>
</body>
</html>
